<!doctype html>
<html lang="ar" dir="ltr">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" integrity="sha384-dpuaG1suU0eT09tx5plTaGMLBsfDLzUCCUXOY2j/LSvXYuG6Bqs43ALlhIqAJVRb" crossorigin="anonymous">

    <title>index</title>

    <!-- Custom CSS -->
    <style>
      body {
        background-color: #f8f9fa;
      }

      .navbar {
        background-color: #aab1ba; /* Dark background color */
        border-radius: 8px;
      }

      .navbar-brand {
        color: #fff; /* Text color for brand */
        font-weight: bold;
      }

      .navbar-nav {
        margin: left; /* Center items */
      }
      .bg-dark {
    --bs-bg-opacity: 1;
    background-color: rgb(221, 221, 222) !important;
}

      .nav-item {
        margin-right:30px; /* Space between items */
      }

      .btn-secondary {
        margin-left: auto; /* Align button to the right */
        margin-right: 10px;
      }
      
        .container {
            margin-top: 50px;
        }

        .custom-container {
            background-color: #e0e0e0; /* Light grey background color */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        .custom-container h2 {
            color: #007bff; /* Blue heading color */
        }

        .custom-container p {
            color: #6c757d; /* Grey text color */
        }

        .custom-container button {
            background-color: #007bff; /* Blue button color */
            color: #fff; /* White text color */
            border: 1px solid #007bff; /* Blue border */
        }

        .custom-container button:hover {
            background-color: #0056b3; /* Darker blue on hover */
            border-color: #0056b3; /* Darker blue border on hover */
        }
        .py-5 {
            padding-top: 3rem !important;
            padding-bottom: 3rem !important;
            background:#f0ececa2;
      }
    </style>
  </head>
  <body>
   
    <div class="container mt-5">

      <section class="p-5 mb-4 bg-light rounded-3">
          <div class="container-fluid py-5">
              <h2 class="display-4 fw-bold">Get Hired Quickly</h2>

              <div class="card">
               <div class ="card-body">
                  <form class="row gy-2 gx-3 align-items-center">
                     <div class="col-sm-2">
                        <label class="visually-hidden" for="autoSizingInput">Name</label>
                        <input type="text" class="form-control" id="autoSizingInput"  placeholder="Job Keyword">
                     </div>
                     <div class="col-sm-3">
                        <label class="visually-hidden" for="autoSizingInput">Select Location</label>
                        <select class="form-select" id="autoSizingInput">
                           <option selected>Select Location</option>
                           <option value="1">One</option>
                           <option value="2">Two</option>
                           <option value="3">Three</option> 
                        </select>
                     </div>
                     <div class="col-sm-3">
                        <label class="visually-hidden" for="autoSizingInput">Choose Job Type</label>
                        <select class="form-select" id="autoSizingInput">
                           <option selected>Choose Job Type</option>
                           <option value="1">One</option>
                           <option value="2">Two</option>
                           <option value="3">Three</option> 
                        </select>
                     </div>
                     <div class="col-sm-3">
                        <label class="visually-hidden" for="autoSizingInput">Select Industry</label>
                        <select class="form-select" id="autoSizingInput">
                           <option selected>Select Industry</option>
                           <option value="1">One</option>
                           <option value="2">Two</option>
                           <option value="3">Three</option> 
                        </select>
                     </div>
                     <div class="col-auto">
                        <button type="submit" class="btn btn-primary">Search</button>
                     </div>
                  </form>
               </div>
              </div>
              <p>
               Welcome to Job Portal! Search and get your dream job. We have thousands of job offerings for you. Don't forget to leave a like when you get a job. Goodluck with you job hunt!
              </p>
              <button class="btn btn-outline-primary" type="button">More Jobs</button>

          </div>
         </section>
      </div>

     
    <!-- Optional JavaScript; choose one of the two! -->
    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
  </body>
</html>
