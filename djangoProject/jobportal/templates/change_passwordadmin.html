{% load static %}

{% block body %}

{% include 'admin_navigation.html' %}

<script>
    function checkpass()
    {
        if(document.changepassword.newpassword.value!=document.changepassword.confirmpassword.value)
        {
            alert('New Password and Confirm Password  Field do not match');
            document.changepassword.confirmpassword.focus();
            return false;
        }
        return true;
    }
</script>

<marquee style="font-family: Monospaced; font-size: 25px; color: aliceblue; background-color: black; font-weight: bold; margin-top: 1%">
    View Recruite - Pending
</marquee>
<hr>
 
<form class="container mt-5" method="post" name="changepassword", onsubmit="return checkpass()">
    {% csrf_token %}
    <label><b>Current Password</b></label>
    <input type="Password" class="form-control" name="currentpassword"  placeholder="Enter Current Password" required="true">

    <label><b>New Password</b></label>
    <input type="Password" class="form-control" name="newpassword"  placeholder="Enter Current Password" required="true">

    <label><b>Confirm Password</b></label>
    <input type="Password" class="form-control" name="confirmpassword"  placeholder="Enter Current Password" required="true">

    
    

    <input type="Submit" class="btn btn-primary" style="margin-top: 2%; color: aliceblue; height: 50px; font-size: 20px">
</form>

{% if error == "no" %}
<script>
    alert("Your Password updated successfully");
    window.location = ('{% url 'Logout' %}')
</script>
{% endif %}

{% if error == "yes" %}
<script>
    alert("Something  Went Wrong, Try Again..")
</script>
{% endif %}

{% if error == "not" %}
<script>
    alert("Your Current Password Wrong, Try Again..")
</script>
{% endblock %}
