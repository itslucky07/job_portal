<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="a.css">
    <style>
    :root {
      --clr-primary: #7380ec;
      --clr-danger: #ff7782;
      --clr-success: #41f1b6;
      --clr-white: #fff;
      --clr-info-dark: #7d8da1;
      --clr-info-light: #dce1eb;
      --clr-dark: #363949;
      --clr-warnig: #ff4edc;
      --clr-light: rgba(132, 139, 200, 0.18);
      --clr-primary-variant: #111e88;
      --clr-dark-variant: #677483;
      --clr-color-background: #f6f6f9;
    
      --card-border-radius: 2rem;
      --border-radius-1: 0.4rem;
      --border-radius-2: 0.8rem;
      --border-radius-3: 1.2rem;
    
      --card-padding: 1.8rem;
      --padding-1: 1.2rem;
      --box-shadow: 0 2rem 3rem var(--clr-light);
    
    }
  
    /* dark theme */
  .dark-theme-variables {
      --clr-color-background: #181a1e;
      --clr-white: #202528;
      --clr-light: rgba(0, 0, 0, 0.4);
      --clr-dark: #edeffd;
      --clr-dark-variant: #677483;
      --box-shadow: 0 2rem 3rem var(--clr-light)
    }
  
  /* Resetting default margin and padding */
  * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      text-decoration: none;
      border: 0;
      list-style: none;
      appearance: none;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      width: 100vw;
      height: 100vh;
      font-size: 0.88rem;
      user-select: none;
      overflow-x: hidden;
      background:var(--clr-white)
    }
    
    .container {
      display: grid;
      width: 96%;
      gap: 0rem;
      grid-template-columns: 12.5rem auto 14rem ;
      margin: 100 auto;
  
    }
    a{
      color: var(--clr-dark);
    }
    h1{
      font-weight: 100;
      font-size: 1.8rem;
    }
    h2{
      font-size: 1.8rem;
    }
    h3{
      font-size: 0.87rem;
    }
    h4{
      font-size: 0.8;
    }
    h5{
      font-size: 0.77rem;
    }
    h6{
      font-size: 0.77rem;
    }
    
    p{
      color: var(--clr-dark-variant);
    }
    b{
      color: var(--clr-dark);
    }
    .primary{
    color: var(--clr-primary);
    }
    .success{
      color: var(--clr-success);
    }
    .danger{
      color: var(--clr-danger);
    }
    .warning{
      color: var(--clr-warning);
    }
    main{
      display: block;
      margin: 0;
      width: 100%;
     
      }
    
    aside {
      height: 100vh;
      width: 200px; /* Adjust the width as needed */
      background-color: var(--clr-color-background);
      color: #181a1e;
    }
    /*.text.muted{
      color:var(--clr-info-dark);
    } */
    .top {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 20px;
      margin-top: 1.4rem;
    }
    
    .logo h2 {
      font-size: 24px;
      color: var(--clr-dark);
    }
    
    .close {
      display:none;
    }
    
    a {
      color:var(--clr-dark);
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 10px 20px;
      transition: background-color 0.3s ease;
    }
    
    a:hover {
      background-color: #555;
    }
  
    .profile_photo img{
      width: 2.8rem;
      height: 2.8rem;
      border-radius: 50%;
      overflow: hidden;
      background-color: black;
    }
    
    .material-symbols-outlined {
      margin-right: 10px;
    }
    
    h3 {
      margin-left: 5px;
    }
    
    .sidebar{
      background-color: var(--clr-white);
      display: flex;
      flex-direction: column;
      position: relative;
      top: 1.4rem;
     }
  
     .right {
      height: 100vh;
      width: 285px;
    }
     
     footer{
      position: absolute;
      bottom: 1rem;
      width: 200px;
      display: block;
     }
  
     .right{
      margin-top: 0rem;
     }
     .right h2{
      color: var(--clr-dark);
     }
     .right .top{
      display: flex;
      justify-content: start;
      gap: 2rem;
     }
     .right .top button{
      display: none;
     }
     .right .theme-toggler {
      background-color: var(--clr-white);
      display: flex;
      justify-content: space-between;
      height: 1.6rem;
      width: 4.2rem;
      cursor: pointer;
      
     }
     
     
     .right .theme-toggler span {
      font-size: 1.2rem;
      width: 50%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
     }
     .right .theme-toggler span.active{
      background-color: var(--clr-primary);
      color: #fff;
     }
  
     .right .top .profile{
      display: flex;
      gap: 2rem;
      text-align: center;
  
     }
     .right .info h3{
      color: var(--clr-dark);
     }
     .right .item h3{
      color: var(--clr-dark);
     }
    </style>
</head>
<body>
        <div class="container">
            <!--aside section start-->
             <aside>
                <div class="top">
                    <div class="logo">
                        <h2>Job<span class="danger">Portal</span></h2>
                    </div>
                    <div class=" close">
                        <span class="material-symbols-outlined">close</span>
                    </div>
                </div>
                <div class="sidebar"></div>
                <a href="#">
                    <span class="material-symbols-outlined">grid_view</span>
                    <h3>Dashboard</h3>
                </a>
                 <div class="sidebar"></div>
                <a href="{% url 'filter2' %}">
                    <span class="material-symbols-outlined">grid_view</span>
                    <h3>filter</h3>
                </a>
                <a href="{% url 'profile' %}">
                    <span class="material-symbols-outlined">account_circle</span>
                    <h3>Pofile</h3>
                </a>
                <a href="#">
                    <span class="material-symbols-outlined">notifications</span>
                    <h3>Notifications</h3>
                </a>
                <a href="#">
                    <span class="material-symbols-outlined">settings</span>
                    <h3>settings</h3>
                </a>
                <footer>
                <a href="{% url 'index2' %}">
                    <span class="material-symbols-outlined">Logout</span> 
                    <h3>Logout</h3>
                </a> 
                </footer>
             </aside>
             <!--aside section end-->

             <!--main section start-->
           <main>
               
           </main>
           <!--main section end-->

           <!--right section start-->
        <div class="right">
            <div class="top">
                <button id="menu_bar">
                    <span class="material-symbols-sharp">menu</span>
                </button>
                <div class="theme-toggler">
                    <span class="material-symbols-sharp active">light_mode</span>
                    <span class="material-symbols-sharp">dark_mode</span>
                </div>
                <div class="profile">
                    <div class="info">
                        <p><b>Sahil</b></p>
                        <p>Admin</p>
                        <small class="text_muted"></small>
                    </div>
                </div>
                <div class="profile_photo">
                    <img src="img1.jpg" width="100%">
                </div>
            </div>
        
           <!--right section end-->
           
        </div>
</body>

</html>
