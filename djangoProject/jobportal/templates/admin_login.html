{% load static %}

{% block body %}

{% include 'navigation.html' %}

<marquee style="font-family:Monospaced; font-size: 25px; color: aliceblue; background-color: black; font-weight: bold; margin-top: 1%">
    Admin Login
</marquee>
<hr>
<form class="container mt-5" method="post">
    {% csrf_token %}
    <label><b>Username</b></label>
    <input type="text" class="form-control" name="username" placeholder="Enter Username">

    <label><b>Password</b></label>
    <input type="password" class="form-control" name="password" placeholder="Enter Password">

    <input type="Submit" class="btn btn-primary" style="margin-top: 2%; color: aliceblue; height: 50px; font-size: 20px">
</form>

{% if error == "no" %}
<script>
    alert("Login successful");
    window.location = ('{% url 'admin_home' %}')
</script>
{% endif %}

{% if error == "yes" %}
<script>
    alert("Invalid Login credentials, Try Again..")
</script>
{% endif %}


{% endblock %}
